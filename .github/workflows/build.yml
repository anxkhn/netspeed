name: Build NetSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project NetSpeed.xcodeproj -scheme NetSpeed
      - name: Build unsigned
        run: |
          xcodebuild build \
            -project NetSpeed.xcodeproj \
            -scheme NetSpeed \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO
